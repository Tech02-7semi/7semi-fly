<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <meta name="theme-color"
        content="#111">

  <title>7Semi Fly</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <!-- HEADER -->
  <header class="top-bar">

    <div class="top-icon">📶</div>

    <div class="logo">
      7Semi Fly
    </div>

    <div class="top-icon">⚙</div>

  </header>

  <!-- STATUS -->
  <section class="status-box">

    <h2 id="status">
      Connected
    </h2>

  </section>

  <!-- TELEMETRY -->
  <section class="telemetry">

    <div class="card">
      <span>THROTTLE</span>
      <h1 id="throttleText">0%</h1>
    </div>

    <div class="card">
      <span>ROLL</span>
      <h1 id="rollText">0°</h1>
    </div>

    <div class="card">
      <span>PITCH</span>
      <h1 id="pitchText">0°</h1>
    </div>

    <div class="card">
      <span>YAW</span>
      <h1 id="yawText">0°</h1>
    </div>

  </section>

  <!-- CONTROLS -->
  <main class="controls">

    <!-- LEFT JOYSTICK -->
    <div class="joystick-wrapper">

      <div class="joystick-base"
           id="leftBase"
           aria-label="Throttle and Yaw Joystick">

        <div class="joystick-stick"
             id="leftStick"></div>

      </div>

      <p>THROTTLE / YAW</p>

    </div>

    <!-- CENTER -->
    <section class="center-panel">

      <div class="connection-box">

        <div class="green-dot"></div>

        <h3>Drone Ready</h3>

      </div>

      <button type="button"
              class="stop-btn"
              onclick="sendCommand('stop')">

        EMERGENCY STOP

      </button>

    </section>

    <!-- RIGHT JOYSTICK -->
    <div class="joystick-wrapper">

      <div class="joystick-base"
           id="rightBase"
           aria-label="Roll and Pitch Joystick">

        <div class="joystick-stick"
             id="rightStick"></div>

      </div>

      <p>ROLL / PITCH</p>

    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
